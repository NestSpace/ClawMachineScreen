# Card and token management keyboard input handling
# Handles HID input from card/token readers with prefix parsing

[include keygroups_us_ascii.cfg]

# Accumulator for card/token/QR input (10 second timeout for manual typing)
[accumulator card_token_input]
timeout = 10.0

# Accumulate all printable characters (alphanumeric + special symbols including : and -)
[keybinding accumulate_card_token]
keys = alpha_numeric,special_symbols
action = accumulate
buffer = card_token_input

# Process accumulated input on Enter/Return
[keybinding process_card_token_scan]
key = Return
action = function
function = handle_card_token_scan
buffer = card_token_input

# Clear buffer on Escape
[keybinding clear_card_token]
key = Escape
action = clear
buffer = card_token_input

# Backspace support for manual corrections
[keybinding card_token_backspace]
key = BackSpace
action = backspace
buffer = card_token_input

# Apply to both management panels
[panel card_management]
keybindings = accumulate_card_token,process_card_token_scan,clear_card_token,card_token_backspace

[panel token_management]
keybindings = accumulate_card_token,process_card_token_scan,clear_card_token,card_token_backspace
